<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Integração mKFashion - Provador Virtual</title>

  <!-- 1. Carregar o SDK -->
  <script src="https://unpkg.com/mkfashion-sdk/src/mkfashion.js"></script>
</head>
<body>

  <!-- 2. Botão oculto por padrão -->
  <button id="btn-provar" style="display: none;">
    Provador Virtual
  </button>

  <script>
    const PROJECT_ID = '69bbd36a44b548ccd0f965f4';
    const IDENTIFIER = 'ASTBV'; // Aqui passar o identificador do produto de forma reativa a pdp, exemplo  PRODUTO ASTRA : ASTBV


    // 3. Registrar callback do carrinho ANTES de abrir
    mkfashion.addToCart((payload) => {
      console.log('Info do Produto:', payload);
      // Integre com seu carrinho aqui
    });

    // 4. Verificar disponibilidade e mostrar botão, é importante linka a visibilidade do provador com o retorno desse metodo
    const disponivel = mkfashion.isAvailable(PROJECT_ID, IDENTIFIER);

    if (disponivel) {
      const btn = document.getElementById('btn-provar');
      btn.style.display = 'inline-block';

      // 5. Abrir o provador ao clicar
      btn.onclick = () => {
        mkfashion.open({
          projectId: PROJECT_ID,
          identifier: IDENTIFIER
        });
      };
    }
  </script>

</body>
</html>
